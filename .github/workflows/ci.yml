name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CROFAI_API_KEY: ${{ secrets.CROFAI_API_KEY }}
  ANTHROPIC_BASE_URL: https://anthropic.nahcrof.com
  DATABASE_URL: postgres://agent:agent@localhost:5432/agent_system_test

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck
        continue-on-error: true

      - run: npm run typecheck:server

      - run: npm test
        env:
          CROFAI_API_KEY: ${{ secrets.CROFAI_API_KEY }}

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
          POSTGRES_DB: agent_system_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U agent -d agent_system_test
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Start API server
        run: |
          npx tsx src/server/index.ts &
          sleep 5
        env:
          CROFAI_API_KEY: ${{ secrets.CROFAI_API_KEY }}
          DATABASE_URL: postgres://agent:agent@localhost:5432/agent_system_test
          PORT: "3999"

      - name: Seed test data
        run: npx tsx -e "
          const { seed } = require('./src/data/seed');
          seed().catch(e => { console.error(e); process.exit(1); });
        "
        env:
          DATABASE_URL: postgres://agent:agent@localhost:5432/agent_system_test

      - name: Run E2E tests
        run: npm run test:e2e:headless
        env:
          API_URL: http://localhost:3999
          CROFAI_API_KEY: ${{ secrets.CROFAI_API_KEY }}

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: tests/e2e/logs/
          retention-days: 7
