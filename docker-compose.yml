services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3999:3999"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://agent:agent@db:5432/agent_system
      CROFAI_API_KEY: ${CROFAI_API_KEY:?CROFAI_API_KEY is required}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://anthropic.nahcrof.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-deepseek-v4-flash}
      ANTHROPIC_API_KEY: ${CROFAI_API_KEY}
      PORT: "3999"

  app:
    build: .
    ports:
      - "4001:3000"
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_system
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_system"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
