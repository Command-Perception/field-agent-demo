services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://agent:agent@db:5432/agent_system
      CROFAI_API_KEY: ${CROFAI_API_KEY:?CROFAI_API_KEY is required}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://anthropic.nahcrof.com}
      ANTHROPIC_API_KEY: ${CROFAI_API_KEY}
    command: sh -c "npx tsx src/data/migrate.ts && npx tsx src/data/seed.ts && node server.js"

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_system
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_system"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
